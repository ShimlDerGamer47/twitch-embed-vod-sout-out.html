<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch VOD Shout Out</title>
    <link
      rel="icon"
      type="img/png"
      href="IMG Ordner/Website icon Ordner/twitch website icon.png"
    />
    <link rel="stylesheet" href="twitch_vod_shout_out.css" />
    <script defer src="twitch_vod_shout_out.js"></script>
  </head>
  <body>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <div
      id="twitchVodShoutOutContainerId"
      class="twitch-vod-shout-out-container"
    >
      <iframe
        width="1920"
        height="1080"
        src
        frameborder="0"
        id="twitchVodShoutOutId"
        allow="autoplay; muted"
        class="twitch-vod-shout-out"
        allowfullscreen
      ></iframe>
    </div>
  </body>
</html>
